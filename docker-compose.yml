services:
  # --- Message bus ---
  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "exchange-dev-cluster-001"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Relational DB + time-series ---
  # Single shared Postgres instance (TimescaleDB = PostgreSQL + hypertable extension).
  # CONSCIOUS CHOICE: one service hosts both business data (users, orders) and market
  # data (candles hypertable). Acceptable for M2; revisit at M5 if read/write patterns
  # diverge enough to justify separate instances.
  #
  # Init scripts in infra/timescale-init/ run ONLY on first volume initialisation.
  # ⚠ DEV RESET ONLY — NEVER ON AN ENVIRONMENT WITH REAL DATA:
  #   docker compose down -v   ← destroys pgdata (accounts, orders) AND tbdata (TigerBeetle ledger)
  #   docker compose up        ← re-initialises from scratch
  # On a live system this command destroys user funds. Do not normalise it.
  postgres:
    image: timescale/timescaledb:2.14-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: exchange
      POSTGRES_PASSWORD: exchange
      POSTGRES_DB: exchange
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/timescale-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exchange"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Cache ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Double-entry ledger ---
  tigerbeetle-init:
    build:
      context: ./infra
      dockerfile: Dockerfile.tigerbeetle-init
    privileged: true
    volumes:
      - tbdata:/data

  tigerbeetle:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.11
    privileged: true
    depends_on:
      tigerbeetle-init:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    command:
      - "start"
      - "--addresses=0.0.0.0:3001"
      - "/data/0_0.tigerbeetle"
    volumes:
      - tbdata:/data

  # --- Identity provider ---
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev

volumes:
  pgdata:
  tbdata:
