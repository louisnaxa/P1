server:
  port: 8083

spring:
  application:
    name: gateway
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: "true"
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.exchange.common
    listener:
      ack-mode: manual_immediate

  datasource:
    url: jdbc:postgresql://localhost:5432/exchange
    username: exchange
    password: exchange
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak JWKS endpoint — realm name "exchange" assumed for dev.
          # Override via SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI in prod.
          jwk-set-uri: http://localhost:8080/realms/exchange/protocol/openid-connect/certs

logging:
  level:
    com.exchange: DEBUG
