name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test (unit + fast tests, no containers)
        run: ./gradlew build

  chaos:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Chaos integration tests (real TigerBeetle + Kafka)
        run: ./gradlew :settlement:chaosTest

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chaos-test-report
          path: settlement/build/reports/tests/chaosTest/

  custody-chaos:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Custody deposit chaos tests (Anvil + Postgres + Kafka)
        run: ./gradlew :custody-watcher:custodyTest

      - name: Upload custody test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custody-chaos-test-report
          path: custody-watcher/build/reports/tests/custodyTest/

  property:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Property integration tests (real TigerBeetle + PostgreSQL)
        run: ./gradlew :settlement:propertyTest

      - name: Upload property test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-test-report
          path: settlement/build/reports/tests/propertyTest/

  status:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Account-status integration tests (real PostgreSQL)
        run: ./gradlew :gateway:statusTest

      - name: Upload status test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: status-test-report
          path: gateway/build/reports/tests/statusTest/
